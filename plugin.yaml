name: "govulncheck"
version: "0.1.0"
repository: github.com/DataDog/trivy-plugin-govulncheck
maintainer: datadog
output: true
summary: Filter Trivy Go binary vulns with govulncheck (remove false positives)
description: |-
  A Trivy output plugin that reduces false positives for Go binaries.
  For each Go binary in Trivy's report, it runs govulncheck and keeps only
  vulnerabilities that govulncheck confirms are actually used in the binary.
  Usage: trivy image -f json -o plugin=govulncheck <image>
  Govulncheck is compiled into the plugin via golang.org/x/vuln/scan.
  Plugin args: --vuln-db (optional) Go vuln DB URL; -v (optional) verbose.
platforms:
  - selector:
      os: darwin
      arch: amd64
    uri: https://github.com/DataDog/trivy-plugin-govulncheck/releases/download/v0.1.0/trivy-govulncheck_0.1.0_darwin-amd64.tar.gz
    bin: ./trivy-govulncheck
  - selector:
      os: darwin
      arch: arm64
    uri: https://github.com/DataDog/trivy-plugin-govulncheck/releases/download/v0.1.0/trivy-govulncheck_0.1.0_darwin-arm64.tar.gz
    bin: ./trivy-govulncheck
  - selector:
      os: linux
      arch: amd64
    uri: https://github.com/DataDog/trivy-plugin-govulncheck/releases/download/v0.1.0/trivy-govulncheck_0.1.0_linux-amd64.tar.gz
    bin: ./trivy-govulncheck
  - selector:
      os: linux
      arch: arm64
    uri: https://github.com/DataDog/trivy-plugin-govulncheck/releases/download/v0.1.0/trivy-govulncheck_0.1.0_linux-arm64.tar.gz
    bin: ./trivy-govulncheck
